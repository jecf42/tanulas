<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arany János: Toldi (részletek)</title>
    <style>
        :root {
            --paper-color: #fdf6e3;
            --ink-color: #2c3e50;
            --success-color: #27ae60;
            --book-shadow: 0 30px 60px rgba(0,0,0,0.4);
            --transition-speed: 0.6s;
        }

        body {
            background-color: #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            color: var(--ink-color);
            perspective: 2000px;
        }

        /* Megnövelt méretű könyv konténer */
        #book-container {
            display: flex;
            width: 1050px;
            height: 850px; 
            background-color: var(--paper-color);
            box-shadow: var(--book-shadow);
            position: relative;
            border-radius: 8px;
            transition: transform var(--transition-speed) ease-in-out;
            transform-style: preserve-3d;
            overflow: hidden; /* Megakadályozza a kilógást */
        }

        .flipping {
            transform: rotateY(-5deg) scale(0.98);
            opacity: 0.9;
        }

        #book-container::before {
            content: '';
            position: absolute;
            left: 50%;
            width: 3px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.05), rgba(0,0,0,0.2), rgba(0,0,0,0.05));
            z-index: 10;
        }

        .page {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
        }

        #left-page { border-right: 1px solid rgba(0,0,0,0.05); }
        #right-page { background-color: #f9f2e0; align-items: center; }

        h2 {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 15px;
            font-weight: bold;
        }

        /* Finomított sorigazítás */
        .verse-content {
            line-height: 2.2; /* Optimális sorköz */
            font-size: 1.2rem;
            white-space: pre-wrap;
            margin: 0;
        }

        .dropzone {
            display: inline-block;
            min-width: 90px;
            height: 1.4em;
            border-bottom: 2px dashed #95a5a6;
            margin: 0 4px;
            vertical-align: baseline; /* Pontosan a sorvonalra illeszti a szót */
            text-align: center;
            transition: all 0.2s;
            position: relative;
        }

        .dropzone.correct {
            border-bottom: none;
            color: var(--success-color);
            font-weight: bold;
        }

        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding-top: 20px;
            max-width: 90%;
        }

        .draggable-word {
            background: white;
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: grab;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.1);
            user-select: none;
            font-size: 1.1rem;
            transition: transform 0.1s;
        }

        .draggable-word:active { cursor: grabbing; transform: scale(1.05); }

        .nav-btn {
            position: absolute;
            bottom: 40px;
            width: 55px;
            height: 55px;
            background: var(--ink-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            transition: all 0.3s;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .nav-btn:hover:not(:disabled) { background: #34495e; transform: scale(1.1); }
        .nav-btn:disabled { opacity: 0; cursor: default; }
        #prev-btn { left: 30px; }
        #next-btn { right: 30px; }

        .progress {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div id="book-container">
    <div class="page" id="left-page">
        <div class="progress" id="page-num">1 / 7</div>
        <h2>Arany János: Toldi (részletek)</h2>
        <div class="verse-content" id="verse-display"></div>
        <button id="prev-btn" class="nav-btn" onclick="changeStanza(-1)">&#10094;</button>
    </div>

    <div class="page" id="right-page">
        <h2>Szóbank</h2>
        <div class="word-bank" id="word-bank"></div>
        <button id="next-btn" class="nav-btn" onclick="changeStanza(1)">&#10095;</button>
    </div>
</div>

<script>
    const stanzasText = [
        `Mint ha pásztortűz ég őszi éjszakákon,
Messziről lobogva tenger pusztaságon:
Toldi Miklós képe úgy lobog fel nékem
Majd kilenc-tíz ember-öltő régiségben.
   Rémlik, mintha látnám termetes növését,
Pusztító csatában szálfa-öklelését,
Hallanám dübörgő hangjait szavának,
Kit ma képzelnétek Isten haragjának.`,

        `Ez volt ám az ember, ha kellett, a gáton,
Nem terem ma párja hetedhét országon;
Ha most feltámadna s eljőne közétek,
Minden dolgát szemfényvesztésnek hinnétek.
   Hárman sem birnátok súlyos buzogányát,
Parittyaköveit, öklelő kopjáját,
Elhülnétek, látva rettenetes pajzsát,
,És, kit a csizmáján viselt, sarkantyúját.'`,

        `Ég a napmelegtől a kopár szík sarja,
Tikkadt szöcskenyájak legelésznek rajta;
Nincs egy árva fűszál a tors közt kelőben,
Nincs tenyérnyi zöld hely nagy határ mezőben.
   Boglyák hűvösében tíz-tizenkét szolga
Hortyog, mintha legjobb rendin menne dolga;
Hej, pedig üresen, vagy félig rakottan,
Nagy szénás szekerek álldogálnak ottan.`,

        `"Átok és hazugság minden ige szádban!
Egy betű való sincs, Toldi György, a vádban.
Jól tudom, mi lappang bokrodnak megette,
Úgy szeressen Isten, ahogy engemet te!
   Rossz vagyok parasztnak, rossz vagyok vitéznek,
Béresek között is től cudar csihésnek:
Forr epéd, hogy más is márt veled egy tálba,
Vesztenél, ha tudnál, egy vizes kanálba.`,

        `Repül a nehéz kő: ki tudja, hol áll meg?
Ki tudja, hol áll meg s kit hogyan talál meg?
Fuss, ha futhatsz, Miklós! pallos alatt fejed!
Víz sem mossa rólad le a gyilkos nevet!
   Elvadulsz, elzüllöl az apai háztól,
Mint amely kivert kan elzüllik a nyájtól:
Ki egyet agyarral halálosan sérte,
Ugy aztán kimarta őt a többi érte.`,

        `Majd az édes álom pillangó képében
Elvetődött arra tarka köntösében,
De nem mert szemére szállni még sokáig,
Szinte a pirosló hajnal hasadtáig.
   Mert félt a szunyogtól, félt a szúrós nádtól,
Jobban a nádasnak csörtető vadától,
Félt az üldözőknek távoli zajától,
De legis-legjobban Toldi nagy bajától.`,

        `...Állj meg, állj meg, Toldi! gyilkos a szándékod,
Jaj ne vess bosszúdnak véres martalékot.
Tudd meg: a legyilkolt atyafinak vére
Bosszuért kiált fel az egek egére.
   Tudd meg: ha megölnéd tennen testvéredet,
Akkor meggyilkolnád örök életedet;
Ne félj, fenn az Isten; ő majd igazat lát,
Bízd rá a büntető bosszuállás dolgát.`
    ];

    let gameState = stanzasText.map(text => ({
        solved: false,
        indices: [],
        correctMap: {}
    }));

    let currentStanzaIndex = 0;

    function renderStanza() {
        const book = document.getElementById('book-container');
        const verseDisplay = document.getElementById('verse-display');
        const wordBank = document.getElementById('word-bank');
        const pageNum = document.getElementById('page-num');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');

        book.classList.add('flipping');

        setTimeout(() => {
            verseDisplay.innerHTML = '';
            wordBank.innerHTML = '';
            pageNum.innerText = `${currentStanzaIndex + 1} / ${stanzasText.length}`;
            prevBtn.disabled = currentStanzaIndex === 0;
            
            let state = gameState[currentStanzaIndex];
            let text = stanzasText[currentStanzaIndex];
            const wordsInVerse = text.match(/[a-záéíóöőúüűA-ZÁÉÍÓÖŐÚÜŰ-]+/g);

            if (state.indices.length === 0) {
                while(state.indices.length < 10 && state.indices.length < wordsInVerse.length) {
                    let r = Math.floor(Math.random() * wordsInVerse.length);
                    if(!state.indices.includes(r)) state.indices.push(r);
                }
            }

            let currentWordCount = 0;
            const parts = text.split(/([a-záéíóöőúüűA-ZÁÉÍÓÖŐÚÜŰ-]+)/);
            
            parts.forEach(part => {
                if (/[a-záéíóöőúüűA-ZÁÉÍÓÖŐÚÜŰ-]+/.test(part)) {
                    if (state.indices.includes(currentWordCount)) {
                        const span = document.createElement('span');
                        span.className = 'dropzone';
                        span.dataset.correctWord = part.toLowerCase();
                        span.dataset.originalValue = part;
                        span.dataset.idx = currentWordCount;
                        
                        if (state.correctMap[currentWordCount]) {
                            span.innerText = part;
                            span.classList.add('correct');
                        } else {
                            span.ondragover = (e) => e.preventDefault();
                            span.ondrop = handleDrop;
                        }
                        verseDisplay.appendChild(span);
                    } else {
                        verseDisplay.appendChild(document.createTextNode(part));
                    }
                    currentWordCount++;
                } else {
                    verseDisplay.appendChild(document.createTextNode(part));
                }
            });

            updateWordBank();
            checkCompletion();
            book.classList.remove('flipping');
        }, 300);
    }

    function handleDrop(e) {
        e.preventDefault();
        const draggedVal = e.dataTransfer.getData('text');
        const dropzone = e.target;
        const state = gameState[currentStanzaIndex];

        if (draggedVal === dropzone.dataset.correctWord) {
            dropzone.innerText = dropzone.dataset.originalValue;
            dropzone.classList.add('correct');
            state.correctMap[dropzone.dataset.idx] = true;
            updateWordBank();
            checkCompletion();
        } else {
            dropzone.style.backgroundColor = "rgba(231, 76, 60, 0.2)";
            setTimeout(() => dropzone.style.backgroundColor = "transparent", 500);
        }
    }

    function updateWordBank() {
        const wordBank = document.getElementById('word-bank');
        const state = gameState[currentStanzaIndex];
        const wordsInVerse = stanzasText[currentStanzaIndex].match(/[a-záéíóöőúüűA-ZÁÉÍÓÖŐÚÜŰ-]+/g);
        
        wordBank.innerHTML = '';
        const remaining = state.indices
            .filter(idx => !state.correctMap[idx])
            .map(idx => wordsInVerse[idx]);

        remaining.sort(() => Math.random() - 0.5).forEach(word => {
            const wordEl = document.createElement('div');
            wordEl.className = 'draggable-word';
            wordEl.innerText = word;
            wordEl.draggable = true;
            wordEl.dataset.val = word.toLowerCase();
            wordEl.ondragstart = (e) => e.dataTransfer.setData('text', word.toLowerCase());
            wordBank.appendChild(wordEl);
        });
    }

    function checkCompletion() {
        const state = gameState[currentStanzaIndex];
        const nextBtn = document.getElementById('next-btn');
        const isSolved = Object.keys(state.correctMap).length === state.indices.length;
        
        if (isSolved) state.solved = true;
        
        // Mutassuk a nyilat, ha az aktuális oldal kész, VAGY ha az utolsó versszaknál vagyunk és kész
        if (state.solved && currentStanzaIndex < stanzasText.length - 1) {
            nextBtn.disabled = false;
        } else {
            nextBtn.disabled = true;
        }
    }

    function changeStanza(direction) {
        currentStanzaIndex += direction;
        renderStanza();
    }

    renderStanza();
</script>

</body>
</html>
